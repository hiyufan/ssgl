<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞赛管理平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:'Outfit',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;color:#1F2329;background:#F7F8FA;-webkit-font-smoothing:antialiased}
    #root{height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#D0D3D9;border-radius:10px}
    input,textarea,select,button{font-family:inherit;font-size:14px}
    p,h1,h2,h3,h4,h5,h6,ul,ol{margin:0;padding:0;list-style:none}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
    @keyframes auroraShift{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-3%,2%) rotate(1deg)}100%{transform:translate(2%,-2%) rotate(-1deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState,useEffect,useContext,useCallback,createContext,useRef} = React;

    // ═══ API ═══════════════════════════════════════════════
    const API_BASE = 'http://localhost:8080/api/v1';
    const AI_BASE = 'http://localhost:8000/ai/api/v1';

    const getToken=()=>localStorage.getItem('access_token');
    const getRefreshToken=()=>localStorage.getItem('refresh_token');
    const setTokens=t=>{if(t.access_token)localStorage.setItem('access_token',t.access_token);if(t.refresh_token)localStorage.setItem('refresh_token',t.refresh_token)};
    const clearTokens=()=>{localStorage.removeItem('access_token');localStorage.removeItem('refresh_token')};

    let refreshPromise=null;
    const apiFetch=async(url,opts={})=>{
      const headers={'Content-Type':'application/json',...opts.headers};
      const token=getToken();
      if(token)headers['Authorization']=`Bearer ${token}`;
      let res=await fetch(url,{...opts,headers});
      if(res.status===401&&getRefreshToken()){
        if(!refreshPromise)refreshPromise=refreshTokens().finally(()=>{refreshPromise=null});
        if(await refreshPromise){headers['Authorization']=`Bearer ${getToken()}`;res=await fetch(url,{...opts,headers})}
      }
      return res;
    };
    const refreshTokens=async()=>{try{const r=await fetch(`${API_BASE}/auth/refresh`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:getRefreshToken()})});if(!r.ok){clearTokens();return false}const d=await r.json();setTokens(d);return true}catch{clearTokens();return false}};

    const authAPI={
      login:async(c)=>{const r=await fetch(`${API_BASE}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});if(!r.ok)throw new Error('Login failed');const d=await r.json();if(d.tokens)setTokens(d.tokens);return d},
      getMe:async()=>{const r=await apiFetch(`${API_BASE}/users/me`);if(!r.ok)throw new Error('Failed');return r.json()},
      logout:()=>clearTokens(),
      isAuthenticated:()=>!!getToken()
    };
    const competitionsAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/competitions?${q}`);return r.json()},get:async(id)=>{const r=await apiFetch(`${API_BASE}/competitions/${id}`);return r.json()}};
    const teamsAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/teams?${q}`);return r.json()}};
    const workflowsAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/workflows?${q}`);return r.json()},approve:async(id,comment='')=>{const r=await apiFetch(`${API_BASE}/workflows/${id}/approve`,{method:'POST',body:JSON.stringify({comment})});return r.json()},reject:async(id,comment='')=>{const r=await apiFetch(`${API_BASE}/workflows/${id}/reject`,{method:'POST',body:JSON.stringify({comment})});return r.json()}};
    const prePlansAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/pre-plans?${q}`);return r.json()},create:async(d)=>{const r=await apiFetch(`${API_BASE}/pre-plans`,{method:'POST',body:JSON.stringify(d)});return r.json()}};
    const awardsAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/awards?${q}`);return r.json()}};
    const evaluationsAPI={list:async(p={})=>{const q=new URLSearchParams(p).toString();const r=await apiFetch(`${API_BASE}/evaluations?${q}`);return r.json()},create:async(d)=>{const r=await apiFetch(`${API_BASE}/evaluations`,{method:'POST',body:JSON.stringify(d)});return r.json()}};
    const statsAPI={overview:async()=>{const r=await apiFetch(`${API_BASE}/stats/overview`);return r.json()},teachers:async()=>{const r=await apiFetch(`${API_BASE}/stats/teachers`);return r.json()}};

    // ═══ Contexts ══════════════════════════════════════════
    const AuthContext=createContext(null);
    const AppContext=createContext({});

    const AuthProvider=({children})=>{
      const [user,setUser]=useState(null);
      const [loading,setLoading]=useState(true);
      useEffect(()=>{const f=async()=>{if(!getToken()){setLoading(false);return}try{const d=await authAPI.getMe();setUser(d.user||d)}catch{clearTokens()}finally{setLoading(false)}};f()},[]);
      const login=useCallback(async(u,p)=>{const d=await authAPI.login({username:u,password:p});if(d.user)setUser(d.user);else{try{const m=await authAPI.getMe();setUser(m.user||m)}catch{setUser({username:u})}}return d},[]);
      const logout=useCallback(()=>{authAPI.logout();setUser(null)},[]);
      return <AuthContext.Provider value={{user,login,logout,loading,isAuthenticated:!!user}}>{children}</AuthContext.Provider>
    };
    const useAuth=()=>useContext(AuthContext);

    // ═══ Icons ═════════════════════════════════════════════
    const Ic=({n,s=16,c='currentColor',sw=1.8})=>{
      const P={
        home:<><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        trophy:<><circle cx="12" cy="9" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></>,
        users:<><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></>,
        checksq:<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></>,
        barchart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
        gift:<><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/></>,
        star:<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
        search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        chevr:<polyline points="9 18 15 12 9 6"/>,
        chevd:<polyline points="6 9 12 15 18 9"/>,
        chevl:<polyline points="15 18 9 12 15 6"/>,
        x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        check:<polyline points="20 6 9 17 4 12"/>,
        file:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
        sparkle:<><path d="M12 3l1.8 5.4L19.2 9l-5.4 1.8L12 16.2l-1.8-5.4L4.8 9l5.4-1.8L12 3z"/><circle cx="5" cy="18" r="1.5" fill={c} stroke="none"/></>,
        medal:<><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></>,
        layers:<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
        pin:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></>,
        cal:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        upload:<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
        download:<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:'block',flexShrink:0}}>{P[n]||null}</svg>
    };

    // ═══ UI Components ═════════════════════════════════════
    const Btn=({children,variant='primary',size='md',onClick,disabled,style:s={},icon})=>{
      const [hov,setHov]=useState(false);
      const sizes={sm:{padding:'4px 12px',fontSize:12},md:{padding:'7px 16px',fontSize:13}};
      const vars={primary:{background:'#3370FF',color:'#fff'},secondary:{background:'#fff',color:'#1F2329',border:'1px solid #E5E6E8'},ghost:{background:'transparent',color:'#3370FF'}};
      const hs=hov&&!disabled?{primary:{background:'#2860DD'},secondary:{background:'#F7F8FA'},ghost:{background:'#EEF3FF'}}[variant]||{}:{};
      return <button onClick={disabled?undefined:onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,border:'none',borderRadius:6,cursor:disabled?'not-allowed':'pointer',fontWeight:500,whiteSpace:'nowrap',fontFamily:'inherit',outline:'none',transition:'all .12s',opacity:disabled?.5:1,...sizes[size],...vars[variant],...hs,...s}} disabled={disabled}>{icon}{children}</button>
    };

    const Badge=({label,status})=>{
      const SC={ongoing:{bg:'#E8F4FF',color:'#1677FF'},published:{bg:'#E8FFED',color:'#00B42A'},draft:{bg:'#F7F8FA',color:'#8F959E'},completed:{bg:'#F0F0FF',color:'#7C3AED'},pending:{bg:'#FFF7E8',color:'#FF7D00'},approved:{bg:'#E8FFED',color:'#00B42A'},rejected:{bg:'#FFECE8',color:'#F53F3F'},active:{bg:'#E8F4FF',color:'#1677FF'},under_review:{bg:'#FFF7E8',color:'#FF7D00'},submitted:{bg:'#FFF7E8',color:'#FF7D00'},teacher_confirm:{bg:'#FFF7E8',color:'#FF7D00'},settled:{bg:'#F0F0FF',color:'#7C3AED'}};
      const c=SC[status]||{bg:'#F7F8FA',color:'#8F959E'};
      return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:10,fontSize:12,fontWeight:500,...c}}><span style={{width:5,height:5,borderRadius:'50%',background:'currentColor',flexShrink:0}}></span>{label}</span>
    };

    const Card=({children,style:s={},onClick,hover})=>{
      const [hov,setHov]=useState(false);
      return <div onClick={onClick} onMouseEnter={()=>hover&&setHov(true)} onMouseLeave={()=>hover&&setHov(false)}
        style={{background:'#fff',border:`1px solid ${hov?'#C0C4CC':'#E5E6E8'}`,borderRadius:8,boxShadow:hov?'0 4px 16px rgba(0,0,0,.08)':'none',transition:'all .15s',cursor:onClick?'pointer':'default',...s}}>{children}</div>
    };

    const Spinner=({size=20,color='#3370FF'})=><div style={{width:size,height:size,border:`2px solid ${color}22`,borderTop:`2px solid ${color}`,borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:0}}></div>;
    const Empty=({text='暂无数据',sub})=><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:'52px 24px',color:'#8F959E'}}><div style={{fontSize:13,fontWeight:500,color:'#646A73'}}>{text}</div>{sub&&<div style={{fontSize:12,color:'#8F959E'}}>{sub}</div>}</div>;
    const SHead=({title,action,sub})=><div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}><div><div style={{fontSize:14,fontWeight:600,color:'#1F2329'}}>{title}</div>{sub&&<div style={{fontSize:12,color:'#8F959E',marginTop:2}}>{sub}</div>}</div>{action&&<div>{action}</div>}</div>;
    const PageWrap=({children,style:s={}})=><div style={{padding:24,minHeight:'100%',...s}}>{children}</div>;

    // ═══ Toast ═════════════════════════════════════════════
    const ToastContext=createContext({add:()=>{}});
    const ToastProvider=({children})=>{
      const [toasts,setToasts]=useState([]);
      const add=useCallback((msg,type='success')=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000)},[]);
      return <ToastContext.Provider value={{add}}>{children}<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>{toasts.map(t=>{
        const cfg={success:{bg:'#E8FFED',color:'#00B42A',icon:'✓'},error:{bg:'#FFECE8',color:'#F53F3F',icon:'✕'}}[t.type]||{bg:'#EEF3FF',color:'#3370FF',icon:'i'};
        return <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'#fff',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.12)',border:`1px solid ${cfg.color}30`,animation:'fadeUp .25s',minWidth:260,pointerEvents:'all'}}>
          <div style={{width:22,height:22,borderRadius:6,background:cfg.bg,color:cfg.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800}}>{cfg.icon}</div>
          <span style={{flex:1,fontSize:13,color:'#1F2329'}}>{t.msg}</span>
        </div>
      })}</div></ToastContext.Provider>
    };
    const useToast=()=>useContext(ToastContext);

    // ═══ Role Config ═══════════════════════════════════════
    const ROLE_CFG={
      admin:{label:'管理员',tagBg:'#F0F5FF',tagColor:'#1F2329',nav:[{id:'dashboard',icon:'home',label:'首页'},{section:'赛事管理'},{id:'competitions',icon:'trophy',label:'赛事管理'},{id:'teams',icon:'users',label:'团队管理'},{id:'calendar',icon:'cal',label:'赛事日历'},{section:'审批'},{id:'approvals',icon:'checksq',label:'审批中心'},{id:'awards',icon:'gift',label:'获奖管理'},{id:'showcase',icon:'star',label:'成果展示'},{section:'分析'},{id:'evaluations',icon:'star',label:'学生评价'},{id:'stats',icon:'barchart',label:'统计分析'},{section:'AI'},{id:'aitools',icon:'sparkle',label:'AI 工具箱'},{id:'knowledgebase',icon:'layers',label:'知识库'}]},
      teacher:{label:'指导教师',tagBg:'#EEF3FF',tagColor:'#3370FF',nav:[{id:'dashboard',icon:'home',label:'首页'},{section:'赛事'},{id:'competitions',icon:'trophy',label:'赛事列表'},{id:'teams',icon:'users',label:'指导团队'},{id:'calendar',icon:'cal',label:'赛事日历'},{section:'审批'},{id:'approvals',icon:'checksq',label:'待办审批'},{id:'awards',icon:'gift',label:'获奖确认'},{id:'showcase',icon:'star',label:'成果展示'},{section:'分析'},{id:'evaluations',icon:'star',label:'评价中心'},{id:'stats',icon:'barchart',label:'统计分析'},{section:'AI'},{id:'aitools',icon:'sparkle',label:'AI 工具箱'},{id:'knowledgebase',icon:'layers',label:'知识库'}]},
      student:{label:'参赛学生',tagBg:'#F5F0FF',tagColor:'#7C3AED',nav:[{id:'dashboard',icon:'home',label:'首页'},{section:'赛事'},{id:'competitions',icon:'trophy',label:'赛事大厅'},{id:'teams',icon:'users',label:'我的团队'},{id:'calendar',icon:'cal',label:'赛事日历'},{section:'项目'},{id:'preplans',icon:'file',label:'预计划管理'},{section:'AI'},{id:'aitools',icon:'sparkle',label:'AI 工具箱'},{id:'knowledgebase',icon:'layers',label:'知识库'},{section:'评价与展示'},{id:'evaluations',icon:'star',label:'提交评价'},{id:'showcase',icon:'trophy',label:'成果展示'}]},
    };
    const PAGE_LABELS={dashboard:'首页',competitions:'赛事管理',teams:'团队管理',approvals:'审批中心',preplans:'预计划管理',awards:'获奖管理',evaluations:'学生评价',stats:'统计分析',aitools:'AI 工具箱',calendar:'赛事日历',knowledgebase:'知识库',showcase:'成果展示'};

    // ═══ Layout ════════════════════════════════════════════
    const NavItem=({item,active,onClick,isDark})=>{
      const [hov,setHov]=useState(false);
      return <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'1px 8px',padding:'7px 12px',borderRadius:6,cursor:'pointer',
          background:active?(isDark?'rgba(99,102,241,.15)':'#EEF3FF'):hov?(isDark?'rgba(255,255,255,.05)':'#F7F8FA'):'transparent',
          color:active?(isDark?'#a78bfa':'#3370FF'):hov?(isDark?'#fff':'#1F2329'):(isDark?'rgba(255,255,255,.4)':'#646A73'),transition:'all .12s'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}><Ic n={item.icon} s={15} c={active?(isDark?'#a78bfa':'#3370FF'):hov?(isDark?'#fff':'#1F2329'):(isDark?'rgba(255,255,255,.3)':'#8F959E')}/><span style={{fontSize:13,fontWeight:active?500:400}}>{item.label}</span></div>
        {item.badge&&<span style={{background:'#F53F3F',color:'#fff',borderRadius:9,fontSize:10,fontWeight:700,padding:'1px 5px',minWidth:16,textAlign:'center',lineHeight:'16px'}}>{item.badge}</span>}
      </div>
    };

    const Sidebar=()=>{
      const {role,setRole,page,navigate}=useContext(AppContext);
      const [pickerOpen,setPickerOpen]=useState(false);
      const cfg=ROLE_CFG[role];const isDark=role==='student';
      return <div style={{width:220,minWidth:220,height:'100vh',background:isDark?'#0f0f15':'#fff',borderRight:`1px solid ${isDark?'rgba(255,255,255,.06)':'#E5E6E8'}`,display:'flex',flexDirection:'column',flexShrink:0,position:'relative',zIndex:10}}>
        <div style={{height:56,display:'flex',alignItems:'center',gap:10,padding:'0 16px',borderBottom:`1px solid ${isDark?'rgba(255,255,255,.06)':'#E5E6E8'}`,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="layers" s={15} c="#fff" sw={2}/></div>
          <div><div style={{fontSize:13,fontWeight:700,color:isDark?'#fff':'#1F2329'}}>竞赛管理平台</div><div style={{fontSize:10,color:isDark?'rgba(255,255,255,.3)':'#8F959E'}}>AI 驱动全流程管理</div></div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:'8px 0'}}>{cfg.nav.map((item,i)=>{if(item.section)return <div key={i} style={{padding:'12px 20px 3px',fontSize:10,fontWeight:700,color:isDark?'rgba(255,255,255,.2)':'#B0B5BF',textTransform:'uppercase',letterSpacing:'.8px'}}>{item.section}</div>;return <NavItem key={item.id} item={item} active={page===item.id} onClick={()=>navigate(item.id)} isDark={isDark}/>})}</div>
        <div style={{padding:'10px 12px',borderTop:`1px solid ${isDark?'rgba(255,255,255,.06)':'#E5E6E8'}`,flexShrink:0,position:'relative'}}>
          {pickerOpen&&<div style={{position:'absolute',bottom:72,left:12,right:12,background:isDark?'#1a1a24':'#fff',border:`1px solid ${isDark?'rgba(255,255,255,.1)':'#E5E6E8'}`,borderRadius:10,boxShadow:'0 6px 20px rgba(0,0,0,.3)',padding:6,zIndex:200}}>
            {['admin','teacher','student'].map(r=>{const rc=ROLE_CFG[r];const isActive=r===role;return <div key={r} onClick={()=>{setRole(r);setPickerOpen(false);navigate('dashboard')}} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:7,cursor:'pointer',background:isActive?(isDark?'rgba(99,102,241,.2)':'#EEF3FF'):'transparent'}} onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background=isDark?'rgba(255,255,255,.05)':'#F7F8FA'}} onMouseLeave={e=>{e.currentTarget.style.background=isActive?(isDark?'rgba(99,102,241,.2)':'#EEF3FF'):'transparent'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:isDark?'#6366f1':rc.tagBg,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{r[0].toUpperCase()}</div>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:isDark?'#fff':'#1F2329'}}>{rc.label}</div></div>
              {isActive&&<Ic n="check" s={14} c={isDark?'#a78bfa':'#3370FF'}/>}
            </div>})}
          </div>}

      const [role,setRole]=useState('admin');const [page,setPage]=useState('dashboard');const [pageData,setPageData]=useState(null);
      useEffect(()=>{const s=localStorage.getItem('cmp_state');if(s){try{const{role:r,page:p}=JSON.parse(s);if(r)setRole(r);if(p)setPage(p)}catch{}}},[]);
      useEffect(()=>{localStorage.setItem('cmp_state',JSON.stringify({role,page}))},[role,page]);
      const navigate=(p,data)=>{setPage(p);setPageData(data||null)};
      const ctx={role,setRole,page,navigate,pageData};
      const pageTitle=PAGE_LABELS[page]||'首页';
      const renderPage=()=>{switch(page){case 'dashboard':return <Dashboard navigate={navigate}/>;case 'competitions':return <GenericPage title="赛事管理"/>;case 'teams':return <GenericPage title="团队管理"/>;case 'approvals':return <GenericPage title="审批中心"/>;case 'preplans':return <GenericPage title="预计划管理"/>;case 'aitools':return <GenericPage title="AI 工具箱"/>;case 'stats':return <GenericPage title="统计分析"/>;case 'awards':return <GenericPage title="获奖管理"/>;case 'evaluations':return <GenericPage title="学生评价"/>;case 'calendar':return <CalendarPage navigate={navigate}/>;case 'knowledgebase':return <KnowledgeBase navigate={navigate}/>;case 'showcase':return <ShowcasePage navigate={navigate}/>;default:return <Dashboard navigate={navigate}/>}};
      return <AuthProvider><ToastProvider><AppContext.Provider value={ctx}><Layout pageTitle={pageTitle}>{renderPage()}</Layout></AppContext.Provider></ToastProvider></AuthProvider>
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
